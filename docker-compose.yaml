services:
  vllm:
    build:
      context: .
      dockerfile: docker/vllm/Dockerfile
    container_name: vllm-gemma3
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/hf_cache
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    volumes:
      - hf_cache:/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - --model=google/gemma-3-1b-it
      - --host=0.0.0.0
      - --port=8000
      - --dtype=auto
      - --gpu-memory-utilization=0.85
      - --max-model-len=4096

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  hf_cache:
  qdrant_storage: